          ref: ${{ needs.context.outputs.checkout_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Restore bounded compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: mgread-sccache-v1-macos-${{ hashFiles('source/**/Cargo.lock') }}
          restore-keys: |
            mgread-sccache-v1-macos-

      - name: Setup compiler cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies
        shell: pwsh
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build macOS release
        shell: pwsh
        working-directory: source
        run: pnpm build -- macos release

      - name: Normalize macOS artifacts for public release
        shell: pwsh
        run: |
          node scripts/prepare-public-build-artifacts.mjs `
            macos `
            source/构建结果 `
            public-build-results/macos `
