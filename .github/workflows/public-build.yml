        run: |
          ./scripts/publish-release-artifacts.ps1 `
            -InputDir public-build-results/macos `
            -OutputDir public-release-assets/macos `
            -ArchivePassword $env:RELEASE_ARCHIVE_PASSWORD `
            -Repository "${{ github.repository }}" `
            -ReleaseTag "${{ needs.context.outputs.release_tag }}" `
            -ReleaseTitle "MgRead ${{ needs.context.outputs.release_version }}" `
            -SourceRepository "${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}" `
            -SourceRef "${{ needs.context.outputs.source_ref }}" `
            -SourceSha "${{ needs.context.outputs.source_sha }}" `
            -Targets "${{ needs.context.outputs.targets_csv }}" `
            -WorkflowUrl "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  build_harmony_variants:
    name: Build Harmony (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: context
    if: needs.context.outputs.artifact_run_id == '' && contains(needs.context.outputs.targets_csv, 'harmony')
    strategy:
      fail-fast: false
      # Tauri OHOS and ArkTS are both formal release variants. Keep them in one
      # matrix so GitHub runs them concurrently instead of serializing two full
      # Harmony toolchains in one long-running job.
      matrix:
        include:
          - variant: tauri-ohos
            label: Tauri OHOS release
          - variant: arkts
            label: ArkTS release
    env:
      HARMONYOS_CLI_ARCHIVE: commandline-tools-linux-x64-6.1.0.816.zip
      HARMONYOS_CLI_SHA256: 4b21e8a4ce19fc7eb381425a570e936c80067b8a0bef9cdcfe8a49e4764038e2
      # This pinned OHOS CLI is a formal release toolchain. Tracking a moving
      # branch here would silently reuse a binary incompatible with Cargo.ohos.lock.
      TAURI_OHOS_REV: 6ed5b08175fb3a322e8a5cadbdfbe8055085122b
      OHRS_VERSION: 1.4.2
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 1G
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.checkout_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Capture Harmony web toolchain
        shell: bash
        run: |
          set -euxo pipefail
          echo "LEGADO_HARMONY_NODE_DIR=$(dirname "$(command -v node)")" >> "${GITHUB_ENV}"
          echo "LEGADO_HARMONY_PNPM_COMMAND=$(command -v pnpm)" >> "${GITHUB_ENV}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust for Tauri OHOS release
        if: matrix.variant == 'tauri-ohos'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-ohos,x86_64-unknown-linux-ohos

      - name: Restore bounded Tauri OHOS compiler cache
        if: matrix.variant == 'tauri-ohos'
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: mgread-sccache-v2-harmony-tauri-ohos-${{ hashFiles('source/apps/mg-read/src-tauri/Cargo.ohos.lock') }}
          restore-keys: |
            mgread-sccache-v2-harmony-tauri-ohos-

      - name: Setup compiler cache
        if: matrix.variant == 'tauri-ohos'
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Restore HarmonyOS SDK cache
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-harmony-sdk-${{ env.HARMONYOS_CLI_SHA256 }}
          path: ~/.cache/mgread/harmonyos-tools

      - name: Restore Harmony dependency caches
        if: matrix.variant == 'arkts'
        uses: actions/cache@v4
        with:
          # Version/build-profile edits happen on every release and must not
          # invalidate package-manager dependencies.
          key: ${{ runner.os }}-public-build-harmony-deps-${{ hashFiles('source/LegadoArkTS/oh-package-lock.json5', 'source/LegadoArkTS/oh-package.json5') }}
          restore-keys: |
            ${{ runner.os }}-public-build-harmony-deps-
          path: |
            ~/.ohpm
            source/LegadoArkTS/oh_modules
            source/LegadoArkTS/.hvigor

      - name: Restore Tauri OHOS dependency caches
        if: matrix.variant == 'tauri-ohos'
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-public-build-tauri-ohos-deps-${{ hashFiles('source/apps/mg-read/src-tauri/gen/ohos/oh-package-lock.json5') }}
          restore-keys: |
            ${{ runner.os }}-public-build-tauri-ohos-deps-
          path: |
            ~/.ohpm
            source/apps/mg-read/src-tauri/gen/ohos/oh_modules
            source/apps/mg-read/src-tauri/gen/ohos/.hvigor

      - name: Restore Tauri OHOS CLI cache
        if: matrix.variant == 'tauri-ohos'
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-tauri-ohos-cli-${{ env.TAURI_OHOS_REV }}-${{ env.OHRS_VERSION }}
          path: ~/.cargo-tauri-ohos

      - name: Install HarmonyOS SDK
        shell: bash
        run: |
          set -euxo pipefail
          sdk_root="${HOME}/.cache/mgread/harmonyos-tools"
          tools_dir="${sdk_root}/command-line-tools"
          if [ ! -d "${tools_dir}/sdk" ]; then
            cli_url="https://github.com/Okysu/harmony-auto-build/releases/download/${HARMONYOS_CLI_ARCHIVE%.zip}/${HARMONYOS_CLI_ARCHIVE}"
            archive_path="${RUNNER_TEMP}/${HARMONYOS_CLI_ARCHIVE}"
            rm -rf "${sdk_root}"
            mkdir -p "${sdk_root}"
            curl --fail -L -o "${archive_path}" "${cli_url}"
            echo "${HARMONYOS_CLI_SHA256}  ${archive_path}" | sha256sum --check --status
            unzip -q "${archive_path}" -d "${sdk_root}"
            rm "${archive_path}"
          else
            echo "Reusing cached HarmonyOS SDK: ${tools_dir}"
          fi
          sdk_home="${tools_dir}/sdk"
          hap_sign_tool_path="$(find "${sdk_home}" -path '*/toolchains/lib/hap-sign-tool.jar' -print -quit)"

          test -d "${sdk_home}"
          test -n "${hap_sign_tool_path}"
          test -f "${hap_sign_tool_path}"

          chmod -R +x "${tools_dir}/bin"
          echo "hwsdk.dir=${sdk_home}" > source/LegadoArkTS/local.properties
          echo "DEVECO_SDK_HOME=${sdk_home}" >> "${GITHUB_ENV}"
          echo "OHOS_BASE_SDK_HOME=${sdk_home}" >> "${GITHUB_ENV}"
          echo "HOS_SDK_HOME=${sdk_home}" >> "${GITHUB_ENV}"
          echo "HAP_SIGN_TOOL_PATH=${hap_sign_tool_path}" >> "${GITHUB_ENV}"
          echo "OHPM_HOME=${tools_dir}/ohpm" >> "${GITHUB_ENV}"
          # The formal Tauri OHOS CLI reads this DevEco command-line-tools root
          # directly; both matrix variants use the same pinned SDK revision.
          echo "DEV_ECO_STUDIO_INSTALL_PATH=${tools_dir}" >> "${GITHUB_ENV}"
          echo "${tools_dir}/bin" >> "${GITHUB_PATH}"

      - name: Configure Harmony registries
        shell: bash
        run: |
          set -euxo pipefail
          npm config set registry https://repo.huaweicloud.com/repository/npm/
          npm config set @ohos:registry https://repo.harmonyos.com/npm/
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/

      - name: Install web dependencies
        shell: bash
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Install isolated Tauri OHOS release CLI
        if: matrix.variant == 'tauri-ohos'
        shell: bash
        run: |
          set -euxo pipefail
          # Keep the pinned OHOS CLI isolated from the mainline desktop CLI,
          # while treating its output as a required public release artifact.
          if [ ! -x "${HOME}/.cargo-tauri-ohos/bin/cargo-tauri" ]; then
            cargo install tauri-cli \
              --git https://github.com/tauri-apps/tauri \
              --rev "${TAURI_OHOS_REV}" \
              --root "${HOME}/.cargo-tauri-ohos"
          else
            echo "Reusing cached Tauri OHOS CLI."
          fi
          if [ ! -x "${HOME}/.cargo-tauri-ohos/bin/ohrs" ]; then
            cargo install ohrs \
              --version "${OHRS_VERSION}" \
              --root "${HOME}/.cargo-tauri-ohos"
          else
            echo "Reusing cached ohrs CLI."
          fi
          echo "${HOME}/.cargo-tauri-ohos/bin" >> "${GITHUB_PATH}"
          "${HOME}/.cargo-tauri-ohos/bin/cargo-tauri" ohos build --help
          "${HOME}/.cargo-tauri-ohos/bin/ohrs" --version

      - name: Configure Tauri OHOS release signing
        if: matrix.variant == 'tauri-ohos'
        shell: bash
        working-directory: source
        run: |
          set -euxo pipefail
          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import path from "node:path";

          // Both files are trusted repository-owned JSON5 object literals. Use
          // the existing ArkTS release material as the single signing owner so
          // the Tauri release cannot silently fall back to an unsigned HAP.
          function parseObjectLiteral(filePath) {
            const source = fs.readFileSync(filePath, "utf8");
            return Function(`"use strict"; return (${source});`)();
          }

          const workspaceRoot = process.cwd();
          const docsDir = path.join(workspaceRoot, "docs");
          const arktsAppPath = path.join(workspaceRoot, "LegadoArkTS", "AppScope", "app.json5");
          const arktsProfilePath = path.join(workspaceRoot, "LegadoArkTS", "build-profile.json5");
          const tauriRoot = path.join(workspaceRoot, "apps", "mg-read", "src-tauri");
          const tauriConfigPath = path.join(tauriRoot, "tauri.conf.json");
          const tauriAppPath = path.join(tauriRoot, "gen", "ohos", "AppScope", "app.json5");
          const tauriAssetsConfigPath = path.join(
            tauriRoot,
            "gen",
            "ohos",
            "assets",
            "tauri.conf.json",
          );
          const tauriProfilePath = path.join(
            tauriRoot,
            "gen",
            "ohos",
            "build-profile.json5",
          );
          const arktsApp = parseObjectLiteral(arktsAppPath);
          const arktsProfile = parseObjectLiteral(arktsProfilePath);
          const tauriApp = parseObjectLiteral(tauriAppPath);
          const tauriProfile = parseObjectLiteral(tauriProfilePath);
          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, "utf8"));
          const tauriAssetsConfig = JSON.parse(fs.readFileSync(tauriAssetsConfigPath, "utf8"));
          const releaseConfig = structuredClone(
            arktsProfile.app.signingConfigs.find((config) => config.name === "release"),
          );
          if (!releaseConfig) {
            throw new Error("LegadoArkTS release signingConfig is missing");
          }

          for (const key of ["storeFile", "profile", "certpath"]) {
            const fileName = path.basename(releaseConfig.material[key]);
            const resolvedPath = path.join(docsDir, fileName);
            if (!fs.existsSync(resolvedPath)) {
              throw new Error(`Missing Harmony signing file: ${resolvedPath}`);
            }
            releaseConfig.material[key] = resolvedPath.replace(/\\/g, "/");
          }
          if (!fs.existsSync(path.join(docsDir, "material"))) {
            throw new Error("Missing Harmony signing password material directory");
          }

          // This matrix job is isolated from desktop and Android builds. Align
          // every Tauri OHOS identity input with the signed ArkTS profile only
          // for this release checkout; changing AppScope alone makes the Tauri
          // CLI reject the generated project as outdated before compilation.
          const releaseBundleName = arktsApp.app.bundleName;
          tauriConfig.identifier = releaseBundleName;
          tauriAssetsConfig.identifier = releaseBundleName;
          tauriApp.app.bundleName = releaseBundleName;
          tauriProfile.app.signingConfigs = [releaseConfig];
          for (const product of tauriProfile.app.products) {
            product.signingConfig = "release";
          }
          fs.writeFileSync(tauriConfigPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);
          fs.writeFileSync(tauriAssetsConfigPath, `${JSON.stringify(tauriAssetsConfig)}\n`);
          fs.writeFileSync(tauriAppPath, `${JSON.stringify(tauriApp, null, 2)}\n`);
          fs.writeFileSync(tauriProfilePath, `${JSON.stringify(tauriProfile, null, 2)}\n`);
          console.log(`configured release signing in ${tauriProfilePath}`);
          EOF

      - name: Build Tauri OHOS release HAP
        if: matrix.variant == 'tauri-ohos'
        shell: bash
        working-directory: source/apps/mg-read
        run: |
          set -euxo pipefail
          tauri_ohos_cli="${HOME}/.cargo-tauri-ohos/bin/cargo-tauri"
          target_selection_file="src-tauri/gen/ohos/entry/.mg-ohos-targets"
          signed_hap_path="src-tauri/gen/ohos/entry/build/default/outputs/default/entry-default-signed.hap"
          test -x "${tauri_ohos_cli}"

          # The outer build compiles aarch64 in release mode. The generated
          # Hvigor hook receives only x86_64 and passes --release, so neither
          # ABI is rebuilt in the debug profile.
          printf 'x86_64\n' > "${target_selection_file}"
          trap 'rm -f "${target_selection_file}"' EXIT

          # cargo-mobile reads Cargo.lock from the host manifest directory.
          # Load the isolated OHOS lock and expose the same patches to every
          # Cargo metadata/build subprocess started by the pinned CLI.
          cp src-tauri/Cargo.ohos.lock src-tauri/Cargo.lock
          ohos_lock_sha="$(sha256sum src-tauri/Cargo.lock | cut -d ' ' -f1)"
          mkdir -p .cargo
          cp src-tauri/ohos-cargo-patches.toml .cargo/config.toml
          "${tauri_ohos_cli}" ohos build --ci --target aarch64 x86_64
          test "$(sha256sum src-tauri/Cargo.lock | cut -d ' ' -f1)" = "${ohos_lock_sha}"
          test -f "${signed_hap_path}"

          mkdir -p ../../variant-results
          cp "${signed_hap_path}" "../../variant-results/MgRead-harmony-tauri-ohos-release-signed.hap"
          unzip -l "../../variant-results/MgRead-harmony-tauri-ohos-release-signed.hap" | tee /tmp/tauri-ohos-hap-list.txt
          grep -q 'libs/arm64-v8a/libmg_read_lib.so' /tmp/tauri-ohos-hap-list.txt
          grep -q 'libs/x86_64/libmg_read_lib.so' /tmp/tauri-ohos-hap-list.txt
          ! grep -qE 'libs/.*/libentry\.so' /tmp/tauri-ohos-hap-list.txt

      - name: Verify Harmony toolchain
        if: matrix.variant == 'arkts'
        shell: bash
        working-directory: source/LegadoArkTS
        run: |
          echo "JAVA_HOME=${JAVA_HOME}"
          echo "OHOS_BASE_SDK_HOME=${OHOS_BASE_SDK_HOME}"
          command -v ohpm
          command -v hvigorw
          test -f "./local.properties"

      - name: Verify Harmony prebuilt assets
        if: matrix.variant == 'arkts'
        shell: bash
        working-directory: source
        run: |
          test -f "LegadoArkTS/entry/src/main/cpp/prebuilt/curl-impersonate/include/curl/curl.h"
          test -f "LegadoArkTS/entry/src/main/cpp/prebuilt/curl-impersonate/arm64-v8a/libcurl-impersonate.so"
          test -f "LegadoArkTS/entry/src/main/cpp/prebuilt/curl-impersonate/x86_64/libcurl-impersonate.so"

      - name: Patch Harmony build profile to release mode
        if: matrix.variant == 'arkts'
        shell: bash
        working-directory: source
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import path from "node:path";

          const skippedDirs = new Set([".git", ".hvigor", "node_modules", "oh_modules"]);

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (skippedDirs.has(entry.name)) {
                  continue;
                }
                walk(fullPath);
                continue;
              }
              if (entry.name !== "BuildProfile.ets") {
                continue;
              }
              const original = fs.readFileSync(fullPath, "utf8");
              const updated = original
                .replace(/(export const DEBUG(?:\s*:\s*\w+)?\s*=\s*)true\s*;/g, "$1false;")
                .replace(/(export const BUILD_MODE_NAME(?:\s*:\s*\w+)?\s*=\s*)'debug'\s*;/g, "$1'release';");
              if (updated !== original) {
                fs.writeFileSync(fullPath, updated);
                console.log(`patched ${fullPath}`);
              }
            }
          }

          walk(path.join(process.cwd(), "LegadoArkTS"));
          EOF

      - name: Rewrite Harmony signing material paths
        if: matrix.variant == 'arkts'
        shell: bash
        working-directory: source
        run: |
          set -euxo pipefail
          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import path from "node:path";

          const workspaceRoot = process.cwd();
          const buildProfilePath = path.join(workspaceRoot, "LegadoArkTS", "build-profile.json5");
          const docsDir = path.join(workspaceRoot, "docs");
          const signingFiles = [
            { key: "storeFile", fileName: "Mg.p12" },
            { key: "profile", fileName: "mg阅读Release.p7b" },
            { key: "certpath", fileName: "mg阅读.cer" },
          ];

          function escapeRegex(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          }

          let content = fs.readFileSync(buildProfilePath, "utf8");

          for (const { key, fileName } of signingFiles) {
            const resolvedPath = path.join(docsDir, fileName);
            if (!fs.existsSync(resolvedPath)) {
              throw new Error(`Missing Harmony signing file: ${resolvedPath}`);
            }

            const normalizedPath = resolvedPath.replace(/\\/g, "/");
            const matcher = new RegExp(`("${key}"\\s*:\\s*")[^"]*${escapeRegex(fileName)}(")`, "g");
            content = content.replace(matcher, `$1${normalizedPath}$2`);
          }

          fs.writeFileSync(buildProfilePath, content);
          console.log(`rewrote signing paths in ${buildProfilePath}`);
          EOF

      - name: Build ArkTS release HAP
        if: matrix.variant == 'arkts'
        shell: bash
        working-directory: source/LegadoArkTS
        run: |
          set -euxo pipefail
          ohpm install --all
          # entry/hvigorfile.ts owns the web-to-rawfile sync. Calling pnpm here
          # as well would rebuild the same frontend twice before one HAP.
          # GitHub-hosted runners start from a fresh checkout, so an explicit
          # clean only adds latency and throws away reusable hvigor state.
          hvigorw assembleHap --mode module -p product=default -p buildMode=release --no-daemon --stacktrace

      - name: Collect Harmony artifacts
        if: matrix.variant == 'arkts'
        shell: bash
        working-directory: source
        run: |
          mkdir -p variant-results
          # Do not sweep every .hap here: hvigor emits signed/unsigned variants in
          # multiple output directories, and a broad copy silently publishes
          # duplicate Harmony release archives.
          mapfile -t selected_haps < <(find LegadoArkTS/entry/build/default/outputs/default -maxdepth 1 -type f -name '*-signed.hap' | sort)
          if [ "${#selected_haps[@]}" -eq 0 ]; then
            mapfile -t selected_haps < <(find LegadoArkTS/entry/build -type f -name '*-signed.hap' | sort)
          fi
          if [ "${#selected_haps[@]}" -eq 0 ]; then
            echo "No signed HAP was produced under LegadoArkTS/entry/build" >&2
            exit 1
          fi
          printf '%s\n' "${selected_haps[@]}"
          cp "${selected_haps[0]}" "variant-results/MgRead-harmony-arkts-release-signed.hap"
          ls -lah variant-results

      - name: Verify Harmony HAP native libs
        if: matrix.variant == 'arkts'
        shell: bash
        working-directory: source
        run: |
          HAP_PATH="variant-results/MgRead-harmony-arkts-release-signed.hap"
          test -f "$HAP_PATH"
          unzip -l "$HAP_PATH" | tee /tmp/harmony-hap-list.txt
          grep -q 'libs/arm64-v8a/libentry.so' /tmp/harmony-hap-list.txt
          grep -q 'libs/arm64-v8a/libcurl-impersonate.so.4' /tmp/harmony-hap-list.txt
          grep -q 'libs/x86_64/libentry.so' /tmp/harmony-hap-list.txt
          grep -q 'libs/x86_64/libcurl-impersonate.so.4' /tmp/harmony-hap-list.txt

      - name: Normalize Harmony variant for public release
        shell: bash
        run: |
          node scripts/prepare-public-build-artifacts.mjs \
            harmony \
            source/variant-results \
            public-build-results/harmony-${{ matrix.variant }} \
            "${{ needs.context.outputs.release_version }}"

      - name: Upload Harmony variant
        uses: actions/upload-artifact@v4
        with:
          name: package-harmony-${{ matrix.variant }}
          path: public-build-results/harmony-${{ matrix.variant }}/*
          if-no-files-found: error

      - name: Publish Harmony ${{ matrix.label }} release assets immediately
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ARCHIVE_PASSWORD: ${{ secrets.RELEASE_ARCHIVE_PASSWORD }}
        run: |
          ./scripts/publish-release-artifacts.ps1 `
            -InputDir public-build-results/harmony-${{ matrix.variant }} `
            -OutputDir public-release-assets/harmony-${{ matrix.variant }} `
            -ArchivePassword $env:RELEASE_ARCHIVE_PASSWORD `
            -Repository "${{ github.repository }}" `
            -ReleaseTag "${{ needs.context.outputs.release_tag }}" `
            -ReleaseTitle "MgRead ${{ needs.context.outputs.release_version }}" `
            -SourceRepository "${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}" `
            -SourceRef "${{ needs.context.outputs.source_ref }}" `
            -SourceSha "${{ needs.context.outputs.source_sha }}" `
            -Targets "${{ needs.context.outputs.targets_csv }}" `
            -WorkflowUrl "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  build_harmony:
    name: Collect Harmony releases
    runs-on: ubuntu-latest
    needs:
      - context
      - build_harmony_variants
    if: always() && needs.context.outputs.artifact_run_id == '' && contains(needs.context.outputs.targets_csv, 'harmony')
    steps:
      - name: Require every formal Harmony variant
        shell: bash
        run: |
          set -euxo pipefail
          test "${{ needs.build_harmony_variants.result }}" = "success"

      - name: Download Harmony variants
        uses: actions/download-artifact@v4
        with:
          pattern: package-harmony-*
          path: public-build-results/harmony
          merge-multiple: true

      - name: Verify formal Harmony release set
        shell: bash
        run: |
          set -euxo pipefail
          mapfile -t tauri_haps < <(find public-build-results/harmony -maxdepth 1 -type f -name 'MgRead-harmony-tauri-ohos-*.hap' | sort)
          mapfile -t arkts_haps < <(find public-build-results/harmony -maxdepth 1 -type f -name 'MgRead-harmony-arkts-*.hap' | sort)
          test "${#tauri_haps[@]}" -eq 1
          test "${#arkts_haps[@]}" -eq 1
          printf '%s\n' "${tauri_haps[@]}" "${arkts_haps[@]}"

      - name: Upload complete Harmony release set
        uses: actions/upload-artifact@v4
        with:
          name: package-harmony
          path: public-build-results/harmony/*
          if-no-files-found: error

  release:
    name: Finalize Release
    runs-on: windows-latest
    needs:
      - context
      - build_windows
      - build_android
      - build_linux_x64
      - build_linux_arm64
      - build_macos
      - build_harmony
    if: always() && !cancelled() && needs.context.result == 'success'
    outputs:
      artifact_run_id: ${{ steps.download.outputs.artifact_run_id }}
      release_state: ${{ steps.publish.outputs.release_state }}
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source history
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.source_sha }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          # Release notes compare the previous packaged commit with this build's commit.
          # A shallow checkout would make the earlier commit unavailable to git log.
          fetch-depth: 0

      - name: Download every completed leaf artifact
        id: download
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifactRunId = "${{ needs.context.outputs.artifact_run_id }}"
          if ([string]::IsNullOrWhiteSpace($artifactRunId)) {
            $artifactRunId = "${{ github.run_id }}"
          }
          New-Item -ItemType Directory -Path incoming -Force | Out-Null
          $patterns = @(
            "package-windows",
            "package-android-*",
            "package-linux-x64",
            "package-linux-arm64",
            "package-macos",
            "package-harmony-*"
          )
          foreach ($pattern in $patterns) {
            & gh run download $artifactRunId `
              --repo "${{ github.repository }}" `
              --pattern $pattern `
              --dir incoming
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "No downloadable artifact matched $pattern in run $artifactRunId."
            }
          }

          $files = @(Get-ChildItem -Path incoming -Recurse -File)
          "artifact_run_id=$artifactRunId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "has_artifacts=$($files.Count -gt 0)".ToLowerInvariant() |
            Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Inspect downloaded artifacts
        if: steps.download.outputs.has_artifacts == 'true'
        shell: pwsh
        run: |
          if (-not (Test-Path incoming)) {
            throw "Artifact download directory was not created: incoming"
          }

          $files = Get-ChildItem -Path incoming -Recurse -File
          if (-not $files) {
            throw "No files were downloaded into incoming"
          }

          $files |
            Select-Object FullName, Name, Length |
            Format-Table -AutoSize |
            Out-String -Width 240 |
            Write-Host

      - name: Prepare final release directory
        if: steps.download.outputs.has_artifacts == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null

      - name: Ensure 7-Zip
        if: steps.download.outputs.has_artifacts == 'true'
        shell: pwsh
        run: |
          $sevenZip = Get-Command 7z -ErrorAction SilentlyContinue
          if ($sevenZip) {
            Write-Host "7z already available: $($sevenZip.Source)"
            return
          }
          choco install 7zip -y --no-progress

      - name: Create password-protected archives
        if: steps.download.outputs.has_artifacts == 'true'
        shell: pwsh
        env:
          RELEASE_ARCHIVE_PASSWORD: ${{ secrets.RELEASE_ARCHIVE_PASSWORD }}
        run: |
          if (-not $env:RELEASE_ARCHIVE_PASSWORD) {
            throw "Missing secret: RELEASE_ARCHIVE_PASSWORD"
          }
          .\scripts\create-protected-archives.ps1 `
            -InputDir incoming `
            -OutputDir release-assets `
            -Password $env:RELEASE_ARCHIVE_PASSWORD

      - name: Build release manifest
        if: steps.download.outputs.has_artifacts == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifactRunId = "${{ steps.download.outputs.artifact_run_id }}"
          $jobsResponse = & gh api "repos/${{ github.repository }}/actions/runs/$artifactRunId/jobs?per_page=100" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "无法读取 artifact 来源运行的 job 状态，退出码：$LASTEXITCODE"
          }
          $jobs = @($jobsResponse.jobs)

          function Get-JobResult([string]$Name) {
            $job = $jobs | Where-Object { $_.name -eq $Name } | Select-Object -First 1
            if (-not $job -or [string]::IsNullOrWhiteSpace($job.conclusion)) {
              return "skipped"
            }
            return $job.conclusion
          }

          function Get-MatrixResult([string]$NamePrefix) {
            $matrixJobs = @($jobs | Where-Object { $_.name.StartsWith($NamePrefix, [StringComparison]::Ordinal) })
            if ($matrixJobs.Count -eq 0) {
              return "skipped"
            }
            if ($matrixJobs.conclusion -contains "failure") {
              return "failure"
            }
            if ($matrixJobs.conclusion -contains "cancelled") {
              return "cancelled"
            }
            if (@($matrixJobs | Where-Object { $_.conclusion -ne "success" }).Count -eq 0) {
              return "success"
            }
            return "skipped"
          }

          $deliverables = [ordered]@{
            windows = Get-JobResult "Build Windows"
            linux_x64 = Get-JobResult "Build Linux x64"
            linux_arm64 = Get-JobResult "Build Linux arm64"
            macos = Get-JobResult "Build macOS"
            android = [ordered]@{
              arm64 = Get-JobResult "Build Android (arm64)"
              armv7 = Get-JobResult "Build Android (armv7)"
              x86_64 = Get-JobResult "Build Android (x86_64)"
            }
            harmony = [ordered]@{
              tauri_ohos = Get-JobResult "Build Harmony (Tauri OHOS release)"
              arkts = Get-JobResult "Build Harmony (ArkTS release)"
              collection = Get-JobResult "Collect Harmony releases"
            }
          }
          $publishedAssets = @(
            Get-ChildItem -LiteralPath release-assets -File -Filter "*.zip" |
              Sort-Object Name |
              ForEach-Object { $_.Name }
          ) + "build-manifest.json"

          $manifest = [ordered]@{
            source_repository = "${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}"
            source_ref = "${{ needs.context.outputs.source_ref }}"
            source_sha = "${{ needs.context.outputs.source_sha }}"
            targets = "${{ needs.context.outputs.targets_csv }}"
            windows_result = $deliverables.windows
            linux_x64_result = $deliverables.linux_x64
            linux_arm64_result = $deliverables.linux_arm64
            macos_result = $deliverables.macos
            android_result = Get-MatrixResult "Build Android ("
            harmony_result = $deliverables.harmony.collection
            deliverables = $deliverables
            published_assets = $publishedAssets
            release_tag = "${{ needs.context.outputs.release_tag }}"
            release_version = "${{ needs.context.outputs.release_version }}"
            artifact_run_id = $artifactRunId
            finalizer_run_id = "${{ github.run_id }}"
            run_id = $artifactRunId
            run_attempt = "${{ github.run_attempt }}"
            workflow_url = "https://github.com/${{ github.repository }}/actions/runs/$artifactRunId"
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path release-assets/build-manifest.json -Encoding utf8

      - name: Build release notes
        if: steps.download.outputs.has_artifacts == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false
          $currentTag = "${{ needs.context.outputs.release_tag }}"
          $sourceRepository = "${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}"
          $sourceRef = "${{ needs.context.outputs.source_ref }}"
          $sourceSha = "${{ needs.context.outputs.source_sha }}"
          $targets = "${{ needs.context.outputs.targets_csv }}"
          $manifest = Get-Content -Raw release-assets/build-manifest.json | ConvertFrom-Json
          $workflowUrl = $manifest.workflow_url
          $changeSummary = @()
          $commitLines = @()
          $tempDir = Join-Path $env:RUNNER_TEMP ("previous-release-manifest-" + [guid]::NewGuid().ToString("N"))

          try {
            New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
            $releases = @(& gh api "repos/$env:GITHUB_REPOSITORY/releases?per_page=100" | ConvertFrom-Json)
            if ($LASTEXITCODE -ne 0) {
              throw "无法读取公开 Release 列表，退出码：$LASTEXITCODE"
            }

            $previousRelease = $releases |
              Where-Object { -not $_.draft -and -not $_.prerelease -and $_.tag_name -ne $currentTag } |
              Sort-Object -Property published_at -Descending |
              Select-Object -First 1

            if (-not $previousRelease) {
              $changeSummary += "- 未找到上一版公开 Release，本次视为首次发布。"
            } elseif (@($previousRelease.assets | Where-Object { $_.name -eq "build-manifest.json" }).Count -eq 0) {
              $changeSummary += "- 上一版 Release (`$($previousRelease.tag_name)`) 未提供 build-manifest.json，无法计算提交区间。"
            } else {
              & gh release download $previousRelease.tag_name --repo $env:GITHUB_REPOSITORY --pattern build-manifest.json --dir $tempDir --clobber *> $null
              if ($LASTEXITCODE -ne 0) {
                $changeSummary += "- 下载上一版 Release (`$($previousRelease.tag_name)`) 的 build-manifest.json 失败，无法计算提交区间。"
              } else {
                $manifestPath = Join-Path $tempDir "build-manifest.json"
                $previousManifest = Get-Content -Raw $manifestPath | ConvertFrom-Json
                $previousSha = $previousManifest.source_sha

                if ([string]::IsNullOrWhiteSpace($previousSha)) {
                  $changeSummary += "- 上一版 Release (`$($previousRelease.tag_name)`) 缺少 source_sha，无法计算提交区间。"
                } else {
                  & git -C source cat-file -e "$previousSha^{commit}" 2>$null
                  if ($LASTEXITCODE -ne 0) {
                    $changeSummary += "- 上一版提交 ID ``$previousSha`` 不在本次 checkout 的历史中，无法计算提交区间。"
                  } else {
                    & git -C source merge-base --is-ancestor $previousSha $sourceSha 2>$null
                    if ($LASTEXITCODE -ne 0) {
                      $changeSummary += "- 上一版提交 ID ``$previousSha`` 不是本次提交 ID ``$sourceSha`` 的祖先，无法按线性历史生成日志。"
                    } else {
                      $range = "$previousSha..$sourceSha"
                      $commitLines = @((& git -C source log $range --pretty=format:%H%x09%s) -split "`r?`n" | Where-Object { $_ })
                      $commitCount = [int](& git -C source rev-list --count $range)
                      $changeSummary += "- 上次发布标签：$($previousRelease.tag_name)"
                      $changeSummary += "- 提交区间起点（上次打包）：``$previousSha``"
                      $changeSummary += "- 提交区间终点（本次打包）：``$sourceSha``"
                      $changeSummary += "- 提交区间：``$range``"
                      $changeSummary += "- 自上次打包以来新增提交：$commitCount 个"
                    }
                  }
                }
              }
            }
          } finally {
            if (Test-Path $tempDir) {
              Remove-Item -LiteralPath $tempDir -Recurse -Force
            }
          }

          $noteLines = @(
            "## 构建信息",
            "- 来源仓库：$sourceRepository",
            "- Source ref：$sourceRef",
            "- 本次打包提交 ID：``$sourceSha``",
            "- 构建目标：$targets",
            "- Windows：$($manifest.windows_result)",
            "- Linux x64：$($manifest.linux_x64_result)",
            "- Linux arm64：$($manifest.linux_arm64_result)",
            "- macOS：$($manifest.macos_result)",
            "- Android arm64：$($manifest.deliverables.android.arm64)",
            "- Android armv7：$($manifest.deliverables.android.armv7)",
            "- Android x86_64：$($manifest.deliverables.android.x86_64)",
            "- Harmony Tauri OHOS：$($manifest.deliverables.harmony.tauri_ohos)",
            "- Harmony ArkTS：$($manifest.deliverables.harmony.arkts)",
            "- Harmony 完整性汇总：$($manifest.deliverables.harmony.collection)",
            "- 工作流运行：$workflowUrl",
            "",
            "## 已发布成品"
          )
          foreach ($assetName in $manifest.published_assets) {
            $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$currentTag/$assetName"
            $noteLines += "- [$assetName]($downloadUrl)"
          }
          $noteLines += @(
            "",
            "## 更新日志"
          )
          $noteLines += $changeSummary
          if ($commitLines.Count -gt 0) {
            $noteLines += ""
            $noteLines += "### 提交列表（完整）"
            foreach ($line in $commitLines) {
              $parts = $line.Split("`t", 2)
              $shortSha = $parts[0].Substring(0, [Math]::Min(7, $parts[0].Length))
              $subject = if ($parts.Count -gt 1) { $parts[1] } else { "" }
              $noteLines += "- ``$shortSha`` $subject"
            }
          }

          $releaseNotes = ($noteLines -join "`r`n").Trim() + "`r`n"
          Set-Content -Path release-notes.md -Value $releaseNotes -Encoding utf8
          exit 0

      - name: Create or update GitHub release
        id: publish
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ("${{ steps.download.outputs.has_artifacts }}" -ne "true") {
            "release_state=not-published" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "No completed leaf artifacts exist; no empty Release will be created."
            return
          }

          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = "${{ needs.context.outputs.release_tag }}"
          $title = "MgRead ${{ needs.context.outputs.release_version }}"
          $notesFile = "release-notes.md"
          $expectedAssets = @(Get-ChildItem -LiteralPath release-assets -File)

          function Test-FinalReleaseAssets {
            $encodedTag = [Uri]::EscapeDataString($tag)
            $releaseJson = & gh api `
              --method GET `
              "repos/$env:GITHUB_REPOSITORY/releases/tags/$encodedTag" 2>$null

            try {
              $release = $releaseJson | ConvertFrom-Json -ErrorAction Stop
            } catch {
              return $false
            }

            foreach ($asset in $expectedAssets) {
              $expectedDigest = "sha256:$((Get-FileHash -LiteralPath $asset.FullName -Algorithm SHA256).Hash.ToLowerInvariant())"
              $matchingAsset = @($release.assets | Where-Object {
                $_.name -eq $asset.Name -and $_.digest -eq $expectedDigest
              })
              if ($matchingAsset.Count -eq 0) {
                return $false
              }
            }

            return $true
          }

          $published = $false
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            & gh release upload $tag release-assets\* --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -eq 0 -or (Test-FinalReleaseAssets)) {
              $published = $true
              break
            }

            & gh release create $tag release-assets\* `
              --repo $env:GITHUB_REPOSITORY `
              --title $title `
              --notes-file $notesFile
            if ($LASTEXITCODE -eq 0 -or (Test-FinalReleaseAssets)) {
              $published = $true
              break
            }

            if ($attempt -lt 6) {
              Write-Warning "Final release publish attempt $attempt failed; retrying."
              Start-Sleep -Seconds ([Math]::Min(2 * $attempt, 10))
            }
          }

          if (-not $published) {
            throw "无法创建或补齐 Release $tag 的最终资产。"
          }

          & gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $title --notes-file $notesFile
          if ($LASTEXITCODE -ne 0) {
            throw "gh release edit 失败，退出码：$LASTEXITCODE"
          }
          "release_state=published" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  notify:
    name: Notify QQ
    runs-on: ubuntu-latest
    needs:
      - context
      - build_windows
      - build_android
      - build_linux_x64
      - build_linux_arm64
      - build_macos
      - build_harmony
      - release
    if: always() && !cancelled()
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Chinese notification report
        id: report
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Test-Requested([string]$Target) {
            $targets = "${{ needs.context.outputs.targets_csv }}".Split(',', [System.StringSplitOptions]::RemoveEmptyEntries)
            return $targets -contains $Target
          }

          function Convert-TargetResult([string]$Target, [string]$Result) {
            if (-not (Test-Requested $Target)) {
              return "未执行"
            }
            switch ($Result) {
              "success" { return "成功" }
              "failure" { return "失败" }
              "cancelled" { return "已取消" }
              "skipped" { return "跳过" }
              default { return "未知 ($Result)" }
            }
          }

          function Get-JobResult([string]$Name) {
            $job = $jobs | Where-Object { $_.name -eq $Name } | Select-Object -First 1
            if (-not $job -or [string]::IsNullOrWhiteSpace($job.conclusion)) {
              return "skipped"
            }
            return $job.conclusion
          }

          function Get-MatrixResult([string]$NamePrefix) {
            $matrixJobs = @($jobs | Where-Object { $_.name.StartsWith($NamePrefix, [StringComparison]::Ordinal) })
            if ($matrixJobs.Count -eq 0) {
              return "skipped"
            }
            if ($matrixJobs.conclusion -contains "failure") {
              return "failure"
            }
            if ($matrixJobs.conclusion -contains "cancelled") {
              return "cancelled"
            }
            if (@($matrixJobs | Where-Object { $_.conclusion -ne "success" }).Count -eq 0) {
              return "success"
            }
            return "skipped"
          }

          $artifactRunId = "${{ needs.release.outputs.artifact_run_id }}"
          if ([string]::IsNullOrWhiteSpace($artifactRunId)) {
            $artifactRunId = "${{ needs.context.outputs.artifact_run_id }}"
          }
          if ([string]::IsNullOrWhiteSpace($artifactRunId)) {
            $artifactRunId = "${{ github.run_id }}"
          }
          $jobsResponse = & gh api "repos/${{ github.repository }}/actions/runs/$artifactRunId/jobs?per_page=100" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "无法读取构建运行状态，退出码：$LASTEXITCODE"
          }
          $jobs = @($jobsResponse.jobs)

          $windowsResult = Get-JobResult "Build Windows"
          $androidResult = Get-MatrixResult "Build Android ("
          $linuxX64Result = Get-JobResult "Build Linux x64"
          $linuxArm64Result = Get-JobResult "Build Linux arm64"
          $macosResult = Get-JobResult "Build macOS"
          $harmonyResult = Get-JobResult "Collect Harmony releases"
          $buildResults = @(
            @{ Name = "Windows"; Requested = (Test-Requested "windows"); Raw = $windowsResult; Text = (Convert-TargetResult "windows" $windowsResult) }
            @{ Name = "Android"; Requested = (Test-Requested "android"); Raw = $androidResult; Text = (Convert-TargetResult "android" $androidResult) }
            @{ Name = "Linux x64"; Requested = (Test-Requested "linux-x64"); Raw = $linuxX64Result; Text = (Convert-TargetResult "linux-x64" $linuxX64Result) }
            @{ Name = "Linux arm64"; Requested = (Test-Requested "linux-arm64"); Raw = $linuxArm64Result; Text = (Convert-TargetResult "linux-arm64" $linuxArm64Result) }
            @{ Name = "macOS"; Requested = (Test-Requested "macos"); Raw = $macosResult; Text = (Convert-TargetResult "macos" $macosResult) }
            @{ Name = "Harmony"; Requested = (Test-Requested "harmony"); Raw = $harmonyResult; Text = (Convert-TargetResult "harmony" $harmonyResult) }
          )

          $successfulBuilds = @($buildResults | Where-Object { $_.Requested -and $_.Raw -eq "success" })
          $failedBuilds = @($buildResults | Where-Object { $_.Requested -and $_.Raw -in @("failure", "cancelled") })
          $releaseState = "${{ needs.release.outputs.release_state }}"
          $releaseJobResult = "${{ needs.release.result }}"
          if ($releaseState -eq "published") {
            $releaseText = "已发布"
          } elseif ($releaseJobResult -eq "failure") {
            $releaseText = "发布失败"
          } else {
            $releaseText = "未发布（没有可用成品）"
          }

          $publishedAssets = @()
          if ($releaseState -eq "published") {
            $release = & gh release view "${{ needs.context.outputs.release_tag }}" --repo "${{ github.repository }}" --json assets | ConvertFrom-Json
            if ($LASTEXITCODE -ne 0) {
              throw "Release 已发布但无法读取资产列表。"
            }
            $publishedAssets = @($release.assets | ForEach-Object { $_.name } | Sort-Object)
          }
          $publishedAssetText = if ($publishedAssets.Count -gt 0) {
            $publishedAssets -join ", "
          } else {
            "无"
          }

          if ($releaseState -eq "published" -and $failedBuilds.Count -eq 0) {
            $overall = "全部成功"
          } elseif ($releaseState -eq "published") {
            $overall = "部分失败，已发布"
          } elseif ($successfulBuilds.Count -eq 0 -and $failedBuilds.Count -gt 0) {
            $overall = "全部失败"
          } elseif ($releaseJobResult -eq "failure") {
            $overall = "部分成功，发布失败"
          } elseif ($successfulBuilds.Count -gt 0) {
            $overall = "部分失败，未发布"
          } else {
            $overall = "部分完成"
          }

          $sourceSha = "${{ needs.context.outputs.source_sha }}"
          if ([string]::IsNullOrWhiteSpace($sourceSha)) {
            $sourceSha = "未指定（按 Source ref checkout）"
          }

          $report = @"
          公共构建结果：$overall
          发布仓库：${{ github.repository }}
          版本：${{ needs.context.outputs.release_version }}
          标签：${{ needs.context.outputs.release_tag }}
          来源仓库：${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          Source ref：${{ needs.context.outputs.source_ref }}
          Source sha：$sourceSha
          构建目标：${{ needs.context.outputs.targets_csv }}
          Windows：$($buildResults[0].Text)
          Android：$($buildResults[1].Text)
          Linux x64：$($buildResults[2].Text)
          Linux arm64：$($buildResults[3].Text)
          macOS：$($buildResults[4].Text)
          Harmony：$($buildResults[5].Text)
          Release：$releaseText
          已发布成品：$publishedAssetText
          Release 地址：https://github.com/${{ github.repository }}/releases/tag/${{ needs.context.outputs.release_tag }}
          成品来源运行：https://github.com/${{ github.repository }}/actions/runs/$artifactRunId
          收尾运行：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@.Trim()

          $report | Set-Content -Path qq-report.txt -Encoding utf8
          $report | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          $delimiter = "REPORT_" + [guid]::NewGuid().ToString("N")
          "message<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $report | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate QQ notification secrets
        id: qq_config
        shell: pwsh
        env:
          QQ_BOT_APP_ID: ${{ secrets.QQ_BOT_APP_ID }}
          QQ_BOT_APP_SECRET: ${{ secrets.QQ_BOT_APP_SECRET }}
          QQ_BOT_USER_OPENID: ${{ secrets.QQ_BOT_USER_OPENID }}
        run: |
          $values = @{
            QQ_BOT_APP_ID = $env:QQ_BOT_APP_ID
            QQ_BOT_APP_SECRET = $env:QQ_BOT_APP_SECRET
            QQ_BOT_USER_OPENID = $env:QQ_BOT_USER_OPENID
          }

          $present = @($values.GetEnumerator() | Where-Object { -not [string]::IsNullOrWhiteSpace($_.Value) } | ForEach-Object { $_.Name })
          if ($present.Count -eq 0) {
            Write-Host "QQ 通知未配置，跳过发送。"
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            return
          }

          $missing = @($values.GetEnumerator() | Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } | ForEach-Object { $_.Name })
          if ($missing.Count -gt 0) {
            throw "QQ 通知 secrets 配置不完整，缺少：$($missing -join ', ')"
          }

          "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Send QQ notification
        if: steps.qq_config.outputs.enabled == 'true'
        shell: pwsh
        env:
          QQ_BOT_APP_ID: ${{ secrets.QQ_BOT_APP_ID }}
          QQ_BOT_APP_SECRET: ${{ secrets.QQ_BOT_APP_SECRET }}
          QQ_BOT_USER_OPENID: ${{ secrets.QQ_BOT_USER_OPENID }}
        run: |
          $message = Get-Content qq-report.txt -Raw
          python scripts/send-qq-message.py $message
