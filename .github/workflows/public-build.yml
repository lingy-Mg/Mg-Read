# This workflow builds Windows / Android / Harmony artifacts from the private source repo
# and publishes password-protected archives in the public repository releases.
name: Public Build Bridge
run-name: >-
  Public Build ${{
    github.event.client_payload.release_version ||
    inputs.release_version ||
    github.event.client_payload.release_tag ||
    inputs.release_tag ||
    github.ref_name
  }}

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: "Private source repository (owner/name)"
        required: false
        type: string
      source_ref:
        description: "Branch or tag to build when source_sha is empty"
        required: false
        type: string
      source_sha:
        description: "Exact commit SHA to build"
        required: false
        type: string
      targets:
        description: "Build targets"
        required: false
        type: choice
        default: both
        options:
          - both
          - all
          - windows
          - android
          - harmony
      release_tag:
        description: "Release tag to publish in this public repo"
        required: false
        type: string
      release_version:
        description: "Human-readable release version"
        required: false
        type: string
  repository_dispatch:
    types:
      - private-build-request

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.8.0"
  ANDROID_PLATFORM: "android-36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "5"

jobs:
  context:
    name: Resolve Context
    runs-on: windows-latest
    outputs:
      source_ref: ${{ steps.vars.outputs.source_ref }}
      source_sha: ${{ steps.vars.outputs.source_sha }}
      checkout_ref: ${{ steps.vars.outputs.checkout_ref }}
      targets_csv: ${{ steps.vars.outputs.targets_csv }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      release_version: ${{ steps.vars.outputs.release_version }}
    steps:
      - name: Resolve dispatch inputs
        id: vars
        shell: pwsh
        env:
          SECRET_SOURCE_REPOSITORY: ${{ secrets.PRIVATE_SOURCE_REPOSITORY }}
          PRIVATE_SOURCE_PAT: ${{ secrets.PRIVATE_SOURCE_PAT }}
          EVENT_SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          EVENT_SOURCE_REF: ${{ github.event.client_payload.source_ref }}
          EVENT_SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          EVENT_TARGETS: ${{ github.event.client_payload.targets }}
          EVENT_RELEASE_TAG: ${{ github.event.client_payload.release_tag }}
          EVENT_RELEASE_VERSION: ${{ github.event.client_payload.release_version }}
          INPUT_SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          INPUT_TARGETS: ${{ inputs.targets }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          function Pick-First([string[]]$Values) {
            foreach ($value in $Values) {
              if (-not [string]::IsNullOrWhiteSpace($value)) {
                return $value.Trim()
              }
            }
            return ""
          }

          function Write-OutputValue([string]$Name, [string]$Value) {
            "$Name=$Value" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

          $sourceRepository = Pick-First @(
            $env:EVENT_SOURCE_REPOSITORY,
            $env:INPUT_SOURCE_REPOSITORY,
            $env:SECRET_SOURCE_REPOSITORY
          )
          if (-not $sourceRepository) {
            throw "Missing source repository. Set PRIVATE_SOURCE_REPOSITORY secret or pass source_repository input."
          }

          $sourceRef = Pick-First @(
            $env:EVENT_SOURCE_REF,
            $env:INPUT_SOURCE_REF,
            "main"
          )
          $requestedSourceSha = Pick-First @(
            $env:EVENT_SOURCE_SHA,
            $env:INPUT_SOURCE_SHA
          )
          $refToResolve = if ($requestedSourceSha) { $requestedSourceSha } else { $sourceRef }
          if (-not $env:PRIVATE_SOURCE_PAT) {
            throw "Missing secret: PRIVATE_SOURCE_PAT"
          }

          $resolvedSource = Invoke-RestMethod `
            -Headers @{
              Authorization = "Bearer $($env:PRIVATE_SOURCE_PAT)"
              Accept = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
            } `
            -Uri ("https://api.github.com/repos/{0}/commits/{1}" -f $sourceRepository, [uri]::EscapeDataString($refToResolve))
          $sourceSha = $resolvedSource.sha
          if (-not $sourceSha) {
            throw "Failed to resolve source SHA for $sourceRepository @ $refToResolve"
          }

          $checkoutRef = $sourceSha

          $targetsValue = Pick-First @(
            $env:EVENT_TARGETS,
            $env:INPUT_TARGETS,
            "both"
          )
          $targetsCsv = switch ($targetsValue.ToLowerInvariant()) {
            "both" { "windows,android" }
            "all" { "windows,android,harmony" }
            default { ($targetsValue -replace "\s+", "").ToLowerInvariant() }
          }

          $releaseTag = Pick-First @(
            $env:EVENT_RELEASE_TAG,
            $env:INPUT_RELEASE_TAG,
            "manual-$env:GITHUB_RUN_ID"
          )
          $releaseVersion = Pick-First @(
            $env:EVENT_RELEASE_VERSION,
            $env:INPUT_RELEASE_VERSION,
            $releaseTag
          )

          Write-OutputValue "source_ref" $sourceRef
          Write-OutputValue "source_sha" $sourceSha
          Write-OutputValue "checkout_ref" $checkoutRef
          Write-OutputValue "targets_csv" $targetsCsv
          Write-OutputValue "release_tag" $releaseTag
          Write-OutputValue "release_version" $releaseVersion

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: context
    if: contains(needs.context.outputs.targets_csv, 'windows')
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.checkout_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: public-build-windows
          cache-workspace-crates: "true"
          workspaces: |
            source/src-tauri -> target

      - name: Install dependencies
        shell: pwsh
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Disable sccache-only wrappers on hosted runners
        shell: pwsh
        working-directory: source
        run: |
          node --input-type=module -e @'
          import fs from "node:fs";
          const packageJsonPath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          for (const scriptName of ["build:windows:release"]) {
            const original = packageJson.scripts?.[scriptName];
            if (!original) continue;
            packageJson.scripts[scriptName] = original.replace(/RUSTC_WRAPPER=sccache\s*/g, "");
          }
          fs.writeFileSync(packageJsonPath, JSON.stringify(packageJson, null, 2) + "\n");
          '@

      - name: Build Windows release
        shell: pwsh
        working-directory: source
        run: pnpm run build:windows:release

      - name: Normalize Windows artifacts for public release
        shell: pwsh
        run: |
          node scripts/prepare-public-build-artifacts.mjs `
            windows `
            source/构建结果 `
            public-build-results/windows `
            "${{ needs.context.outputs.release_version }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-windows
          path: public-build-results/windows/*
          if-no-files-found: error

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: context
    if: contains(needs.context.outputs.targets_csv, 'android')
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.checkout_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            source/src-tauri/gen/android/*.gradle*
            source/src-tauri/gen/android/**/build.gradle*
            source/src-tauri/gen/android/**/settings.gradle*
            source/src-tauri/gen/android/**/gradle-wrapper.properties
            source/src-tauri/gen/android/gradle.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: public-build-android
          cache-workspace-crates: "true"
          workspaces: |
            source/src-tauri -> target

      - name: Ensure Ninja
        shell: pwsh
        run: |
          $ninja = Get-Command ninja -ErrorAction SilentlyContinue
          if ($ninja) {
            Write-Host "ninja already available: $($ninja.Source)"
            return
          }
          if ($IsLinux) {
            sudo apt-get update
            sudo apt-get install -y ninja-build
            return
          }
          choco install ninja -y --no-progress

      - name: Install Android SDK packages
        shell: pwsh
        run: |
          sdkmanager --install `
            "platform-tools" `
            "platforms;${env:ANDROID_PLATFORM}" `
            "build-tools;${env:ANDROID_BUILD_TOOLS}" `
            "ndk;${env:ANDROID_NDK_VERSION}"

      - name: Materialize Android signing files
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if (-not $env:ANDROID_KEYSTORE_BASE64) {
            throw "Missing secret: ANDROID_KEYSTORE_BASE64"
          }
          if (-not $env:ANDROID_KEY_ALIAS) {
            throw "Missing secret: ANDROID_KEY_ALIAS"
          }
          if (-not $env:ANDROID_KEYSTORE_PASSWORD) {
            throw "Missing secret: ANDROID_KEYSTORE_PASSWORD"
          }
          if (-not $env:ANDROID_KEY_PASSWORD) {
            throw "Missing secret: ANDROID_KEY_PASSWORD"
          }

          $androidDir = Join-Path $PWD "source/src-tauri/gen/android"
          $androidAppDir = Join-Path $androidDir "app"
          $keystorePath = Join-Path $androidAppDir "legado.jks"
          $keyPropsPath = Join-Path $androidDir "key.properties"

          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))

          @"
          storePassword=$env:ANDROID_KEYSTORE_PASSWORD
          keyPassword=$env:ANDROID_KEY_PASSWORD
          keyAlias=$env:ANDROID_KEY_ALIAS
          storeFile=legado.jks
          "@.Trim() | Set-Content -Path $keyPropsPath -Encoding utf8

      - name: Rewrite Android Gradle JDK path for the runner
        shell: pwsh
        run: |
          $gradlePropsPath = Join-Path $PWD "source/src-tauri/gen/android/gradle.properties"
          $content = Get-Content $gradlePropsPath -Raw
          $escapedJavaHome = $env:JAVA_HOME.Replace("\", "\\")
          $updated = [Regex]::Replace(
            $content,
            'org\.gradle\.java\.home=.*',
            "org.gradle.java.home=$escapedJavaHome"
          )
          Set-Content -Path $gradlePropsPath -Value $updated -Encoding utf8

      - name: Normalize Tauri beforeBuildCommand for Linux Android runner
        shell: pwsh
        working-directory: source
        run: |
          $tauriConfigPath = Join-Path $PWD "src-tauri/tauri.conf.json"
          $content = Get-Content $tauriConfigPath -Raw
          $updated = $content -replace '"beforeBuildCommand"\s*:\s*"cmd /c pnpm build"', '"beforeBuildCommand": "pnpm build"'
          if ($updated -eq $content) {
            throw "Failed to rewrite beforeBuildCommand in src-tauri/tauri.conf.json"
          }
          Set-Content -Path $tauriConfigPath -Value $updated -Encoding utf8

      - name: Sanitize repo .env host-path overrides for Android runner
        shell: pwsh
        working-directory: source
        run: |
          $envPath = Join-Path $PWD ".env"
          if (-not (Test-Path $envPath)) {
            Write-Host ".env not found, skip sanitization."
            return
          }
          $lines = Get-Content $envPath
          $filtered = $lines | Where-Object {
            $_ -notmatch '^(JAVA_HOME|ANDROID_HOME|ANDROID_SDK_ROOT|ANDROID_NDK_HOME|NDK_HOME)='
          }
          Set-Content -Path $envPath -Value $filtered -Encoding utf8

      - name: Install dependencies
        shell: pwsh
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Disable sccache-only wrappers on hosted runners
        shell: pwsh
        working-directory: source
        run: |
          node --input-type=module -e @'
          import fs from "node:fs";
          const packageJsonPath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          for (const scriptName of [
            "build:android:release",
            "build:android:release:armv7",
            "build:android:release:all"
          ]) {
            const original = packageJson.scripts?.[scriptName];
            if (!original) continue;
            packageJson.scripts[scriptName] = original.replace(/RUSTC_WRAPPER=sccache\s*/g, "");
          }
          fs.writeFileSync(packageJsonPath, JSON.stringify(packageJson, null, 2) + "\n");
          '@

      - name: Build Android release
        shell: pwsh
        working-directory: source
        run: |
          $ndkHome = Join-Path $env:ANDROID_HOME "ndk\${env:ANDROID_NDK_VERSION}"
          $ninja = Get-Command ninja -ErrorAction Stop
          $env:ANDROID_NDK_HOME = $ndkHome
          $env:NDK_HOME = $ndkHome
          $env:CMAKE_GENERATOR = "Ninja"
          $env:CMAKE_MAKE_PROGRAM = $ninja.Source
          $env:GRADLE_OPTS = "-Dorg.gradle.java.home=$env:JAVA_HOME"
          pnpm run build:android:release

      - name: Normalize Android artifacts for public release
        shell: pwsh
        run: |
          node scripts/prepare-public-build-artifacts.mjs `
            android `
            source/构建结果 `
            public-build-results/android `
            "${{ needs.context.outputs.release_version }}"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-android
          path: public-build-results/android/*
          if-no-files-found: error

  build_harmony:
    name: Build Harmony
    runs-on: ubuntu-latest
    needs: context
    if: contains(needs.context.outputs.targets_csv, 'harmony')
    env:
      HARMONYOS_CLI_ARCHIVE: commandline-tools-linux-x64-6.1.0.816.zip
      HARMONYOS_CLI_SHA256: 4b21e8a4ce19fc7eb381425a570e936c80067b8a0bef9cdcfe8a49e4764038e2
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.checkout_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Capture Harmony web toolchain
        shell: bash
        run: |
          set -euxo pipefail
          echo "LEGADO_HARMONY_NODE_DIR=$(dirname "$(command -v node)")" >> "${GITHUB_ENV}"
          echo "LEGADO_HARMONY_PNPM_COMMAND=$(command -v pnpm)" >> "${GITHUB_ENV}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Harmony dependency caches
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-public-build-harmony-deps-${{ hashFiles('source/pnpm-lock.yaml', 'source/LegadoArkTS/oh-package-lock.json5', 'source/LegadoArkTS/oh-package.json5', 'source/LegadoArkTS/hvigorfile.ts', 'source/LegadoArkTS/build-profile.json5') }}
          restore-keys: |
            ${{ runner.os }}-public-build-harmony-deps-
          path: |
            ~/.ohpm
            ~/.npm
            source/LegadoArkTS/oh_modules
            source/LegadoArkTS/.hvigor
            source/LegadoArkTS/node_modules

      - name: Install HarmonyOS SDK
        shell: bash
        run: |
          set -euxo pipefail
          cli_url="https://github.com/Okysu/harmony-auto-build/releases/download/${HARMONYOS_CLI_ARCHIVE%.zip}/${HARMONYOS_CLI_ARCHIVE}"
          curl --fail -L -o "${HARMONYOS_CLI_ARCHIVE}" "${cli_url}"
          echo "${HARMONYOS_CLI_SHA256}  ${HARMONYOS_CLI_ARCHIVE}" | sha256sum --check --status

          sdk_root="${RUNNER_TEMP}/harmonyos-tools"
          rm -rf "${sdk_root}"
          mkdir -p "${sdk_root}"
          unzip -q "${HARMONYOS_CLI_ARCHIVE}" -d "${sdk_root}"
          rm "${HARMONYOS_CLI_ARCHIVE}"

          tools_dir="${sdk_root}/command-line-tools"
          sdk_home="${tools_dir}/sdk"
          hap_sign_tool_path="$(find "${sdk_home}" -path '*/toolchains/lib/hap-sign-tool.jar' -print -quit)"

          test -d "${sdk_home}"
          test -n "${hap_sign_tool_path}"
          test -f "${hap_sign_tool_path}"

          chmod -R +x "${tools_dir}/bin"
          echo "hwsdk.dir=${sdk_home}" > source/LegadoArkTS/local.properties
          echo "DEVECO_SDK_HOME=${sdk_home}" >> "${GITHUB_ENV}"
          echo "OHOS_BASE_SDK_HOME=${sdk_home}" >> "${GITHUB_ENV}"
          echo "HOS_SDK_HOME=${sdk_home}" >> "${GITHUB_ENV}"
          echo "HAP_SIGN_TOOL_PATH=${hap_sign_tool_path}" >> "${GITHUB_ENV}"
          echo "OHPM_HOME=${tools_dir}/ohpm" >> "${GITHUB_ENV}"
          echo "${tools_dir}/bin" >> "${GITHUB_PATH}"

      - name: Configure Harmony registries
        shell: bash
        run: |
          set -euxo pipefail
          npm config set registry https://repo.huaweicloud.com/repository/npm/
          npm config set @ohos:registry https://repo.harmonyos.com/npm/
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/

      - name: Install web dependencies
        shell: bash
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Sync Harmony rawfile web bundle
        shell: bash
        working-directory: source
        run: |
          pnpm run build:harmony

      - name: Verify Harmony toolchain
        shell: bash
        working-directory: source/LegadoArkTS
        run: |
          echo "JAVA_HOME=${JAVA_HOME}"
          echo "OHOS_BASE_SDK_HOME=${OHOS_BASE_SDK_HOME}"
          command -v ohpm
          command -v hvigorw
          test -f "./local.properties"

      - name: Verify Harmony prebuilt assets
        shell: bash
        working-directory: source
        run: |
          test -f "LegadoArkTS/entry/src/main/cpp/prebuilt/curl-impersonate/include/curl/curl.h"
          test -f "LegadoArkTS/entry/src/main/cpp/prebuilt/curl-impersonate/arm64-v8a/libcurl-impersonate.so"
          test -f "LegadoArkTS/entry/src/main/cpp/prebuilt/curl-impersonate/x86_64/libcurl-impersonate.so"

      - name: Patch Harmony build profile to release mode
        shell: bash
        working-directory: source
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import path from "node:path";

          const skippedDirs = new Set([".git", ".hvigor", "node_modules", "oh_modules"]);

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (skippedDirs.has(entry.name)) {
                  continue;
                }
                walk(fullPath);
                continue;
              }
              if (entry.name !== "BuildProfile.ets") {
                continue;
              }
              const original = fs.readFileSync(fullPath, "utf8");
              const updated = original
                .replace(/(export const DEBUG(?:\s*:\s*\w+)?\s*=\s*)true\s*;/g, "$1false;")
                .replace(/(export const BUILD_MODE_NAME(?:\s*:\s*\w+)?\s*=\s*)'debug'\s*;/g, "$1'release';");
              if (updated !== original) {
                fs.writeFileSync(fullPath, updated);
                console.log(`patched ${fullPath}`);
              }
            }
          }

          walk(path.join(process.cwd(), "LegadoArkTS"));
          EOF

      - name: Rewrite Harmony signing material paths
        shell: bash
        working-directory: source
        run: |
          set -euxo pipefail
          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import path from "node:path";

          const workspaceRoot = process.cwd();
          const buildProfilePath = path.join(workspaceRoot, "LegadoArkTS", "build-profile.json5");
          const docsDir = path.join(workspaceRoot, "docs");
          const signingFiles = [
            { key: "storeFile", fileName: "Mg.p12" },
            { key: "profile", fileName: "mg阅读Release.p7b" },
            { key: "certpath", fileName: "mg阅读.cer" },
          ];

          function escapeRegex(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          }

          let content = fs.readFileSync(buildProfilePath, "utf8");

          for (const { key, fileName } of signingFiles) {
            const resolvedPath = path.join(docsDir, fileName);
            if (!fs.existsSync(resolvedPath)) {
              throw new Error(`Missing Harmony signing file: ${resolvedPath}`);
            }

            const normalizedPath = resolvedPath.replace(/\\/g, "/");
            const matcher = new RegExp(`("${key}"\\s*:\\s*")[^"]*${escapeRegex(fileName)}(")`, "g");
            content = content.replace(matcher, `$1${normalizedPath}$2`);
          }

          fs.writeFileSync(buildProfilePath, content);
          console.log(`rewrote signing paths in ${buildProfilePath}`);
          EOF

      - name: Build Harmony release
        shell: bash
        working-directory: source/LegadoArkTS
        run: |
          set -euxo pipefail
          ohpm install --all
          hvigorw clean --no-daemon --stacktrace
          hvigorw assembleHap --mode module -p product=default -p buildMode=release --no-daemon --stacktrace

      - name: Collect Harmony artifacts
        shell: bash
        working-directory: source
        run: |
          mkdir -p 构建结果
          # Do not sweep every .hap here: hvigor emits signed/unsigned variants in
          # multiple output directories, and a broad copy silently publishes
          # duplicate Harmony release archives.
          mapfile -t selected_haps < <(find LegadoArkTS/entry/build/default/outputs/default -maxdepth 1 -type f -name '*-signed.hap' | sort)
          if [ "${#selected_haps[@]}" -eq 0 ]; then
            mapfile -t selected_haps < <(find LegadoArkTS/entry/build -type f -name '*-signed.hap' | sort)
          fi
          if [ "${#selected_haps[@]}" -eq 0 ]; then
            mapfile -t selected_haps < <(find LegadoArkTS/entry/build -type f -name '*.hap' | sort)
          fi
          if [ "${#selected_haps[@]}" -eq 0 ]; then
            echo "No .hap artifacts were produced under LegadoArkTS/entry/build" >&2
            exit 1
          fi
          printf '%s\n' "${selected_haps[@]}"
          cp "${selected_haps[@]}" 构建结果/
          ls -lah 构建结果
          test -n "$(find 构建结果 -maxdepth 1 -type f -name '*.hap')"

      - name: Verify Harmony HAP native libs
        shell: bash
        working-directory: source
        run: |
          HAP_PATH="$(find 构建结果 -maxdepth 1 -type f -name '*-signed.hap' | sort | head -n 1)"
          if [ -z "$HAP_PATH" ]; then
            HAP_PATH="$(find 构建结果 -maxdepth 1 -type f -name '*.hap' | sort | head -n 1)"
          fi
          test -n "$HAP_PATH"
          unzip -l "$HAP_PATH" | tee /tmp/harmony-hap-list.txt
          grep -q 'libs/arm64-v8a/libentry.so' /tmp/harmony-hap-list.txt
          grep -q 'libs/arm64-v8a/libcurl-impersonate.so.4' /tmp/harmony-hap-list.txt
          grep -q 'libs/x86_64/libentry.so' /tmp/harmony-hap-list.txt
          grep -q 'libs/x86_64/libcurl-impersonate.so.4' /tmp/harmony-hap-list.txt

      - name: Normalize Harmony artifacts for public release
        shell: bash
        run: |
          node scripts/prepare-public-build-artifacts.mjs \
            harmony \
            source/构建结果 \
            public-build-results/harmony \
            "${{ needs.context.outputs.release_version }}"

      - name: Upload Harmony artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-harmony
          path: public-build-results/harmony/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: windows-latest
    needs:
      - context
      - build_windows
      - build_android
      - build_harmony
    if: >-
      always() &&
      !cancelled() &&
      (
        needs.build_windows.result == 'success' ||
        needs.build_android.result == 'success' ||
        needs.build_harmony.result == 'success'
      )
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source history
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.source_sha }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 0

      - name: Download Windows artifacts
        if: needs.build_windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: package-windows
          path: incoming/windows

      - name: Download Android artifacts
        if: needs.build_android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: package-android
          path: incoming/android

      - name: Download Harmony artifacts
        if: needs.build_harmony.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: package-harmony
          path: incoming/harmony

      - name: Inspect downloaded artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path incoming)) {
            throw "Artifact download directory was not created: incoming"
          }

          $files = Get-ChildItem -Path incoming -Recurse -File
          if (-not $files) {
            throw "No files were downloaded into incoming"
          }

          $files |
            Select-Object FullName, Name, Length |
            Format-Table -AutoSize |
            Out-String -Width 240 |
            Write-Host

      - name: Build release manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          $manifest = [ordered]@{
            source_repository = "${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}"
            source_ref        = "${{ needs.context.outputs.source_ref }}"
            source_sha        = "${{ needs.context.outputs.source_sha }}"
            targets           = "${{ needs.context.outputs.targets_csv }}"
            windows_result    = "${{ needs.build_windows.result }}"
            android_result    = "${{ needs.build_android.result }}"
            harmony_result    = "${{ needs.build_harmony.result }}"
            release_tag       = "${{ needs.context.outputs.release_tag }}"
            release_version   = "${{ needs.context.outputs.release_version }}"
            run_id            = "${{ github.run_id }}"
            run_attempt       = "${{ github.run_attempt }}"
            workflow_url      = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path release-assets/build-manifest.json -Encoding utf8

      - name: Ensure 7-Zip
        shell: pwsh
        run: |
          $sevenZip = Get-Command 7z -ErrorAction SilentlyContinue
          if ($sevenZip) {
            Write-Host "7z already available: $($sevenZip.Source)"
            return
          }
          choco install 7zip -y --no-progress

      - name: Create password-protected archives
        shell: pwsh
        env:
          RELEASE_ARCHIVE_PASSWORD: ${{ secrets.RELEASE_ARCHIVE_PASSWORD }}
        run: |
          if (-not $env:RELEASE_ARCHIVE_PASSWORD) {
            throw "Missing secret: RELEASE_ARCHIVE_PASSWORD"
          }
          $expectedKinds = @()
          if ("${{ needs.build_windows.result }}" -eq "success") {
            $expectedKinds += "windows"
          }
          if ("${{ needs.build_android.result }}" -eq "success") {
            $expectedKinds += "android"
          }
          if ("${{ needs.build_harmony.result }}" -eq "success") {
            $expectedKinds += "harmony"
          }
          .\scripts\create-protected-archives.ps1 `
            -InputDir incoming `
            -OutputDir release-assets `
            -Password $env:RELEASE_ARCHIVE_PASSWORD `
            -ExpectedKinds $expectedKinds

      - name: Build release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\scripts\build-release-notes.ps1 `
            -PublicRepo $env:GITHUB_REPOSITORY `
            -CurrentTag "${{ needs.context.outputs.release_tag }}" `
            -CurrentVersion "${{ needs.context.outputs.release_version }}" `
            -SourceRepository "${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}" `
            -SourceRef "${{ needs.context.outputs.source_ref }}" `
            -SourceSha "${{ needs.context.outputs.source_sha }}" `
            -Targets "${{ needs.context.outputs.targets_csv }}" `
            -WindowsResult "${{ needs.build_windows.result }}" `
            -AndroidResult "${{ needs.build_android.result }}" `
            -HarmonyResult "${{ needs.build_harmony.result }}" `
            -WorkflowUrl "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" `
            -SourceDir source `
            -OutputPath release-notes.md

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ needs.context.outputs.release_tag }}"
          $title = "Legado Tauri ${{ needs.context.outputs.release_version }}"
          $notesFile = "release-notes.md"

          & gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          $exists = $LASTEXITCODE -eq 0

          if (-not $exists) {
            & gh release create $tag release-assets\* `
              --repo $env:GITHUB_REPOSITORY `
              --title $title `
              --notes-file $notesFile
            if ($LASTEXITCODE -ne 0) {
              throw "gh release create 失败，退出码：$LASTEXITCODE"
            }
            return
          }

          & gh release upload $tag release-assets\* --repo $env:GITHUB_REPOSITORY --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "gh release upload 失败，退出码：$LASTEXITCODE"
          }

          & gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $title --notes-file $notesFile
          if ($LASTEXITCODE -ne 0) {
            throw "gh release edit 失败，退出码：$LASTEXITCODE"
          }

  notify:
    name: Notify QQ
    runs-on: ubuntu-latest
    needs:
      - context
      - build_windows
      - build_android
      - build_harmony
      - release
    if: always() && !cancelled()
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Chinese notification report
        id: report
        shell: pwsh
        run: |
          function Test-Requested([string]$Target) {
            $targets = "${{ needs.context.outputs.targets_csv }}".Split(',', [System.StringSplitOptions]::RemoveEmptyEntries)
            return $targets -contains $Target
          }

          function Convert-TargetResult([string]$Target, [string]$Result) {
            if (-not (Test-Requested $Target)) {
              return "未执行"
            }
            switch ($Result) {
              "success" { return "成功" }
              "failure" { return "失败" }
              "cancelled" { return "已取消" }
              "skipped" { return "跳过" }
              default { return "未知 ($Result)" }
            }
          }

          function Convert-ReleaseResult([string]$Result) {
            switch ($Result) {
              "success" { return "成功" }
              "failure" { return "失败" }
              "cancelled" { return "已取消" }
              "skipped" { return "未发布" }
              default { return "未知 ($Result)" }
            }
          }

          $buildResults = @(
            @{ Name = "Windows"; Requested = (Test-Requested "windows"); Raw = "${{ needs.build_windows.result }}"; Text = (Convert-TargetResult "windows" "${{ needs.build_windows.result }}") }
            @{ Name = "Android"; Requested = (Test-Requested "android"); Raw = "${{ needs.build_android.result }}"; Text = (Convert-TargetResult "android" "${{ needs.build_android.result }}") }
            @{ Name = "Harmony"; Requested = (Test-Requested "harmony"); Raw = "${{ needs.build_harmony.result }}"; Text = (Convert-TargetResult "harmony" "${{ needs.build_harmony.result }}") }
          )

          $successfulBuilds = @($buildResults | Where-Object { $_.Requested -and $_.Raw -eq "success" })
          $failedBuilds = @($buildResults | Where-Object { $_.Requested -and $_.Raw -in @("failure", "cancelled") })
          $releaseRaw = "${{ needs.release.result }}"
          $releaseText = Convert-ReleaseResult $releaseRaw

          if ($releaseRaw -eq "success" -and $failedBuilds.Count -eq 0) {
            $overall = "全部成功"
          } elseif ($successfulBuilds.Count -eq 0) {
            $overall = "全部失败"
          } elseif ($releaseRaw -eq "success") {
            $overall = "部分成功"
          } elseif ($releaseRaw -eq "failure") {
            $overall = "部分成功，发布失败"
          } elseif ($releaseRaw -eq "skipped") {
            $overall = "部分失败，未发布"
          } else {
            $overall = "部分完成"
          }

          $sourceSha = "${{ needs.context.outputs.source_sha }}"
          if ([string]::IsNullOrWhiteSpace($sourceSha)) {
            $sourceSha = "未指定（按 Source ref checkout）"
          }

          $report = @"
          公共构建结果：$overall
          发布仓库：${{ github.repository }}
          版本：${{ needs.context.outputs.release_version }}
          标签：${{ needs.context.outputs.release_tag }}
          来源仓库：${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          Source ref：${{ needs.context.outputs.source_ref }}
          Source sha：$sourceSha
          构建目标：${{ needs.context.outputs.targets_csv }}
          Windows：$($buildResults[0].Text)
          Android：$($buildResults[1].Text)
          Harmony：$($buildResults[2].Text)
          Release：$releaseText
          运行链接：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@.Trim()

          $report | Set-Content -Path qq-report.txt -Encoding utf8
          $report | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          $delimiter = "REPORT_" + [guid]::NewGuid().ToString("N")
          "message<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $report | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate QQ notification secrets
        id: qq_config
        shell: pwsh
        env:
          QQ_BOT_APP_ID: ${{ secrets.QQ_BOT_APP_ID }}
          QQ_BOT_APP_SECRET: ${{ secrets.QQ_BOT_APP_SECRET }}
          QQ_BOT_USER_OPENID: ${{ secrets.QQ_BOT_USER_OPENID }}
        run: |
          $values = @{
            QQ_BOT_APP_ID = $env:QQ_BOT_APP_ID
            QQ_BOT_APP_SECRET = $env:QQ_BOT_APP_SECRET
            QQ_BOT_USER_OPENID = $env:QQ_BOT_USER_OPENID
          }

          $present = @($values.GetEnumerator() | Where-Object { -not [string]::IsNullOrWhiteSpace($_.Value) } | ForEach-Object { $_.Name })
          if ($present.Count -eq 0) {
            Write-Host "QQ 通知未配置，跳过发送。"
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            return
          }

          $missing = @($values.GetEnumerator() | Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } | ForEach-Object { $_.Name })
          if ($missing.Count -gt 0) {
            throw "QQ 通知 secrets 配置不完整，缺少：$($missing -join ', ')"
          }

          "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Send QQ notification
        if: steps.qq_config.outputs.enabled == 'true'
        shell: pwsh
        env:
          QQ_BOT_APP_ID: ${{ secrets.QQ_BOT_APP_ID }}
          QQ_BOT_APP_SECRET: ${{ secrets.QQ_BOT_APP_SECRET }}
          QQ_BOT_USER_OPENID: ${{ secrets.QQ_BOT_USER_OPENID }}
        run: |
          $message = Get-Content qq-report.txt -Raw
          python scripts/send-qq-message.py $message
