# This workflow builds Windows / Android / Linux x64 / Linux arm64 / macOS / Harmony artifacts from the private source repo
# and publishes password-protected archives in the public repository releases.
name: Public Build Bridge
run-name: >-
  Public Build ${{
    github.event.client_payload.release_version ||
    inputs.release_version ||
    github.event.client_payload.release_tag ||
    inputs.release_tag ||
    github.ref_name
  }}

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: "Private source repository (owner/name)"
        required: false
        type: string
      source_ref:
        description: "Branch or tag to build when source_sha is empty"
        required: false
        type: string
      source_sha:
        description: "Exact commit SHA to build"
        required: false
        type: string
      targets:
        description: "Build targets (windows,android,linux,linux-x64,linux-arm64,macos,harmony,both,all or comma-separated list)"
        required: false
        type: string
        default: all
      release_tag:
        description: "Release tag to publish in this public repo"
        required: false
        type: string
      release_version:
        description: "Human-readable release version"
        required: false
        type: string
  repository_dispatch:
    types:
      - private-build-request

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  # Keep this aligned with the source workspace packageManager. pnpm 11.8.0
  # crashes on this lockfile during frozen installs (missing integrity lookup),
  # so do not lower it while the workspace declares pnpm@11.12.0.
  PNPM_VERSION: "11.12.0"
  ANDROID_PLATFORM: "android-36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "5"
  # build-command.mjs honors this contract and calls rustc directly. Do not
  # rewrite package.json scripts: the parameterized entry no longer embeds wrappers there.
  LEGADO_DISABLE_SCCACHE: "1"

jobs:
  context:
    name: Resolve Context
    runs-on: windows-latest
    outputs:
      source_ref: ${{ steps.vars.outputs.source_ref }}
      source_sha: ${{ steps.vars.outputs.source_sha }}
      checkout_ref: ${{ steps.vars.outputs.checkout_ref }}
      targets_csv: ${{ steps.vars.outputs.targets_csv }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      release_version: ${{ steps.vars.outputs.release_version }}
    steps:
      - name: Resolve dispatch inputs
        id: vars
        shell: pwsh
        env:
          SECRET_SOURCE_REPOSITORY: ${{ secrets.PRIVATE_SOURCE_REPOSITORY }}
          PRIVATE_SOURCE_PAT: ${{ secrets.PRIVATE_SOURCE_PAT }}
          EVENT_SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          EVENT_SOURCE_REF: ${{ github.event.client_payload.source_ref }}
          EVENT_SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          EVENT_TARGETS: ${{ github.event.client_payload.targets }}
          EVENT_RELEASE_TAG: ${{ github.event.client_payload.release_tag }}
          EVENT_RELEASE_VERSION: ${{ github.event.client_payload.release_version }}
          INPUT_SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          INPUT_TARGETS: ${{ inputs.targets }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          function Pick-First([string[]]$Values) {
            foreach ($value in $Values) {
              if (-not [string]::IsNullOrWhiteSpace($value)) {
                return $value.Trim()
              }
            }
            return ""
          }

          function Write-OutputValue([string]$Name, [string]$Value) {
            "$Name=$Value" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

          $sourceRepository = Pick-First @(
            $env:EVENT_SOURCE_REPOSITORY,
            $env:INPUT_SOURCE_REPOSITORY,
            $env:SECRET_SOURCE_REPOSITORY
          )
          if (-not $sourceRepository) {
            throw "Missing source repository. Set PRIVATE_SOURCE_REPOSITORY secret or pass source_repository input."
          }

          $sourceRef = Pick-First @(
            $env:EVENT_SOURCE_REF,
            $env:INPUT_SOURCE_REF,
            "main"
          )
          $requestedSourceSha = Pick-First @(
            $env:EVENT_SOURCE_SHA,
            $env:INPUT_SOURCE_SHA
          )
          $refToResolve = if ($requestedSourceSha) { $requestedSourceSha } else { $sourceRef }
          if (-not $env:PRIVATE_SOURCE_PAT) {
            throw "Missing secret: PRIVATE_SOURCE_PAT"
          }

          $resolvedSource = Invoke-RestMethod `
            -Headers @{
              Authorization = "Bearer $($env:PRIVATE_SOURCE_PAT)"
              Accept = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
            } `
            -Uri ("https://api.github.com/repos/{0}/commits/{1}" -f $sourceRepository, [uri]::EscapeDataString($refToResolve))
          $sourceSha = $resolvedSource.sha
          if (-not $sourceSha) {
            throw "Failed to resolve source SHA for $sourceRepository @ $refToResolve"
          }

          $checkoutRef = $sourceSha

          $targetsValue = Pick-First @(
            $env:EVENT_TARGETS,
            $env:INPUT_TARGETS,
            "all"
          )
          $targetsCsv = switch ($targetsValue.ToLowerInvariant()) {
            "both" { "windows,android" }
            "linux" { "linux-x64,linux-arm64" }
            "all" { "windows,android,linux-x64,linux-arm64,macos,harmony" }
            default { ($targetsValue -replace "\s+", "").ToLowerInvariant() }
          }

          $releaseTag = Pick-First @(
            $env:EVENT_RELEASE_TAG,
            $env:INPUT_RELEASE_TAG,
            "manual-$env:GITHUB_RUN_ID"
          )
          $releaseVersion = Pick-First @(
            $env:EVENT_RELEASE_VERSION,
            $env:INPUT_RELEASE_VERSION,
            $releaseTag
          )

          Write-OutputValue "source_ref" $sourceRef
          Write-OutputValue "source_sha" $sourceSha
          Write-OutputValue "checkout_ref" $checkoutRef
          Write-OutputValue "targets_csv" $targetsCsv
          Write-OutputValue "release_tag" $releaseTag
          Write-OutputValue "release_version" $releaseVersion

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: context
    if: contains(needs.context.outputs.targets_csv, 'windows')
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.checkout_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: public-build-windows
          cache-workspace-crates: "true"
          workspaces: |
            source/src-tauri -> target

      - name: Install dependencies
        shell: pwsh
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build Windows release
        shell: pwsh
        working-directory: source
        run: pnpm build -- windows release

      - name: Normalize Windows artifacts for public release
        shell: pwsh
        run: |
          node scripts/prepare-public-build-artifacts.mjs `
            windows `
            source/构建结果 `
            public-build-results/windows `
            "${{ needs.context.outputs.release_version }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-windows
          path: public-build-results/windows/*
          if-no-files-found: error

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: context
    if: contains(needs.context.outputs.targets_csv, 'android')
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.checkout_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            source/src-tauri/gen/android/*.gradle*
            source/src-tauri/gen/android/**/build.gradle*
            source/src-tauri/gen/android/**/settings.gradle*
            source/src-tauri/gen/android/**/gradle-wrapper.properties
            source/src-tauri/gen/android/gradle.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: public-build-android
          cache-workspace-crates: "true"
          workspaces: |
            source/src-tauri -> target

      - name: Ensure Ninja
        shell: pwsh
        run: |
          $ninja = Get-Command ninja -ErrorAction SilentlyContinue
          if ($ninja) {
            Write-Host "ninja already available: $($ninja.Source)"
            return
          }
          if ($IsLinux) {
            sudo apt-get update
            sudo apt-get install -y ninja-build
            return
          }
          choco install ninja -y --no-progress

      - name: Install Android SDK packages
        shell: pwsh
        run: |
          sdkmanager --install `
            "platform-tools" `
            "platforms;${env:ANDROID_PLATFORM}" `
            "build-tools;${env:ANDROID_BUILD_TOOLS}" `
            "ndk;${env:ANDROID_NDK_VERSION}"

      - name: Materialize Android signing files
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if (-not $env:ANDROID_KEYSTORE_BASE64) {
            throw "Missing secret: ANDROID_KEYSTORE_BASE64"
          }
          if (-not $env:ANDROID_KEY_ALIAS) {
            throw "Missing secret: ANDROID_KEY_ALIAS"
          }
          if (-not $env:ANDROID_KEYSTORE_PASSWORD) {
            throw "Missing secret: ANDROID_KEYSTORE_PASSWORD"
          }
          if (-not $env:ANDROID_KEY_PASSWORD) {
            throw "Missing secret: ANDROID_KEY_PASSWORD"
          }

          # The generated Android Gradle project belongs to the MgRead app.
          # Writing to the historical root src-tauri path leaves signing values null.
          $androidDir = Join-Path $PWD "source/apps/mg-read/src-tauri/gen/android"
          $androidAppDir = Join-Path $androidDir "app"
          $keystorePath = Join-Path $androidAppDir "legado.jks"
          $keyPropsPath = Join-Path $androidDir "key.properties"

          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))

          @"
          storePassword=$env:ANDROID_KEYSTORE_PASSWORD
          keyPassword=$env:ANDROID_KEY_PASSWORD
          keyAlias=$env:ANDROID_KEY_ALIAS
          storeFile=legado.jks
          "@.Trim() | Set-Content -Path $keyPropsPath -Encoding utf8

      - name: Rewrite Android Gradle JDK path for the runner
        shell: pwsh
        run: |
          $gradlePropsPath = Join-Path $PWD "source/src-tauri/gen/android/gradle.properties"
          $content = Get-Content $gradlePropsPath -Raw
          $escapedJavaHome = $env:JAVA_HOME.Replace("\", "\\")
          $updated = [Regex]::Replace(
            $content,
            'org\.gradle\.java\.home=.*',
            "org.gradle.java.home=$escapedJavaHome"
          )
          Set-Content -Path $gradlePropsPath -Value $updated -Encoding utf8

      - name: Normalize Tauri beforeBuildCommand for Linux Android runner
        shell: pwsh
        working-directory: source
        run: |
          $tauriConfigPath = Join-Path $PWD "src-tauri/tauri.conf.json"
          $content = Get-Content $tauriConfigPath -Raw
          $updated = $content -replace '"beforeBuildCommand"\s*:\s*"cmd /c pnpm build"', '"beforeBuildCommand": "pnpm build"'
          if ($updated -eq $content) {
            throw "Failed to rewrite beforeBuildCommand in src-tauri/tauri.conf.json"
          }
          Set-Content -Path $tauriConfigPath -Value $updated -Encoding utf8

      - name: Sanitize repo .env host-path overrides for Android runner
        shell: pwsh
        working-directory: source
        run: |
          $envPath = Join-Path $PWD ".env"
          if (-not (Test-Path $envPath)) {
            Write-Host ".env not found, skip sanitization."
            return
          }
          $lines = Get-Content $envPath
          $filtered = $lines | Where-Object {
            $_ -notmatch '^(JAVA_HOME|ANDROID_HOME|ANDROID_SDK_ROOT|ANDROID_NDK_HOME|NDK_HOME)='
          }
          Set-Content -Path $envPath -Value $filtered -Encoding utf8

      - name: Install dependencies
        shell: pwsh
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build Android release
        shell: pwsh
        working-directory: source
        run: |
          # This file is deliberately Windows-specific for local Jenkins. Tauri
          # reapplies its linker entry when spawning Cargo, so environment
          # overrides alone cannot make it portable to this Linux runner.
          $localCargoConfig = Join-Path $PWD "apps/mg-read/src-tauri/.cargo/config.toml"
          if (Test-Path $localCargoConfig) {
            Move-Item -LiteralPath $localCargoConfig -Destination "$localCargoConfig.local-windows"
          }
          $ndkHome = Join-Path $env:ANDROID_HOME "ndk\${env:ANDROID_NDK_VERSION}"
          # The private checkout keeps Windows linker settings for local Jenkins.
          # Cargo propagates them to cc-rs, so override them with this Linux runner's NDK.
          $toolchainBin = Join-Path $ndkHome "toolchains/llvm/prebuilt/linux-x86_64/bin"
          $androidClang = Join-Path $toolchainBin "aarch64-linux-android24-clang"
          $ninja = Get-Command ninja -ErrorAction Stop
          $env:ANDROID_NDK_HOME = $ndkHome
          $env:NDK_HOME = $ndkHome
          $env:CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER = $androidClang
          $env:CC_aarch64_linux_android = $androidClang
          $env:AR_aarch64_linux_android = Join-Path $toolchainBin "llvm-ar"
          $env:CMAKE_GENERATOR = "Ninja"
          $env:CMAKE_MAKE_PROGRAM = $ninja.Source
          # Tauri mobile plugin generation can race while copying its shared Kotlin API directory.
          # Preserve normal parallel performance and retry only that known transient failure.
          $androidBuildLog = Join-Path $env:RUNNER_TEMP "mgread-android-build.log"
          $androidBuildAttempt = 1
          while ($true) {
            & pnpm build -- android all release 2>&1 | Tee-Object -FilePath $androidBuildLog
            $androidBuildExitCode = $LASTEXITCODE
            if ($androidBuildExitCode -eq 0) {
              break
            }
            $isTauriApiCopyRace = $androidBuildAttempt -eq 1 -and (Select-String -LiteralPath $androidBuildLog -SimpleMatch "tauri-plugin: failed to copy tauri-api" -Quiet)
            if (-not $isTauriApiCopyRace) {
              exit $androidBuildExitCode
            }
            Write-Warning "Retrying Android build after Tauri Kotlin API copy race."
            $tauriApiDir = Join-Path $PWD "src-tauri/vendor/tauri-plugin-opener/android/.tauri/tauri-api"
            Remove-Item -LiteralPath $tauriApiDir -Recurse -Force -ErrorAction SilentlyContinue
            $androidBuildAttempt++
          }
          $env:GRADLE_OPTS = "-Dorg.gradle.java.home=$env:JAVA_HOME"

      - name: Normalize Android artifacts for public release
        shell: pwsh
        run: |
          node scripts/prepare-public-build-artifacts.mjs `
            android `
            source/构建结果 `
            public-build-results/android `
            "${{ needs.context.outputs.release_version }}"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-android
          path: public-build-results/android/*
          if-no-files-found: error

  build_linux_x64:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    needs: context
    if: contains(needs.context.outputs.targets_csv, 'linux-x64')
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repository || inputs.source_repository || secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.context.outputs.checkout_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: public-build-linux-x64
          cache-workspace-crates: "true"
          workspaces: |
            source/src-tauri -> target

      - name: Install Linux system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libspeechd-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Normalize Tauri beforeBuildCommand for Linux runner
        shell: bash
        working-directory: source
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          tauri_config_path = Path("src-tauri/tauri.conf.json")
          content = tauri_config_path.read_text(encoding="utf-8")
          before_build_updated = re.sub(
              r'"beforeBuildCommand"\s*:\s*"cmd /c pnpm build"',
              '"beforeBuildCommand": "pnpm build"',
              content,
              count=1,
          )
          updated = re.sub(
              r'"frontendDist"\s*:\s*"\.\./dist"',
              '"frontendDist": "../apps/mg-read/dist"',
              before_build_updated,
              count=1,
          )
          if updated == content:
              raise RuntimeError("Failed to rewrite Tauri build settings in src-tauri/tauri.conf.json")
          tauri_config_path.write_text(updated, encoding="utf-8")
          PY

      - name: Install dependencies
        shell: bash
        working-directory: source
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile

      - name: Build Linux x64 release
        shell: bash
        working-directory: source
        run: |
          set -euxo pipefail
          pnpm build -- linux x64 release

      - name: Package Linux x64 artifacts
        shell: bash
        working-directory: source
        run: |
          set -euxo pipefail
          BIN_PATH="apps/mg-read/src-tauri/target/x86_64-unknown-linux-gnu/release/legado_tauri"
          test -f "$BIN_PATH"
          chmod +x "$BIN_PATH"
          mkdir -p linux-packages/x64
          tar -C "$(dirname "$BIN_PATH")" -czf linux-packages/x64/legado_tauri-linux-x64.tar.gz legado_tauri
          ls -lah linux-packages/x64

      - name: Normalize Linux x64 artifacts for public release
        shell: bash
        run: |
          set -euxo pipefail
          node scripts/prepare-public-build-artifacts.mjs \
            linux \
            source/linux-packages/x64 \
            public-build-results/linux-x64 \
            "${{ needs.context.outputs.release_version }}"

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-linux-x64
          path: public-build-results/linux-x64/*
          if-no-files-found: error

  build_linux_arm64:
    name: Build Linux arm64
    runs-on: ubuntu-24.04-arm
    needs: context
